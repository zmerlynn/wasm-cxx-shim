name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Cancel in-flight runs when a new commit lands on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.os }} / LLVM ${{ matrix.llvm }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        llvm: [20, 21]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install LLVM (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          curl -fsSL https://apt.llvm.org/llvm.sh | sudo bash -s ${{ matrix.llvm }}
          echo "WASM_CXX_SHIM_LLVM_BIN_DIR=/usr/lib/llvm-${{ matrix.llvm }}/bin" >> "$GITHUB_ENV"

      - name: Install LLVM (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install llvm@${{ matrix.llvm }} lld@${{ matrix.llvm }}

      - name: Install wabt + ninja
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update -qq
            sudo apt-get install -y wabt ninja-build
          else
            brew install wabt ninja
          fi

      - name: Configure
        run: cmake --preset wasm32

      - name: Build
        run: cmake --build --preset wasm32

      - name: Test
        run: ctest --preset wasm32 --output-on-failure

      - name: Upload wasm artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: wasm-${{ matrix.os }}-llvm${{ matrix.llvm }}
          path: |
            build/wasm32/libc/libwasm-cxx-shim-libc.a
            build/wasm32/libm/libwasm-cxx-shim-libm.a
            build/wasm32/libcxx/libwasm-cxx-shim-libcxx.a
            build/wasm32/test/smoke/smoke.wasm
          retention-days: 90
          if-no-files-found: error
